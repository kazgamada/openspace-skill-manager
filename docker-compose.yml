services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openspace
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d openspace"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/openspace
      JWT_SECRET: change-me-to-a-random-secret-min-32-chars
      ENCRYPTION_KEY: change-me-to-a-random-32-byte-hex-key
      LOCAL_ADMIN_EMAIL: admin@example.com
      LOCAL_ADMIN_PASSWORD: changeme
      LOCAL_ADMIN_NAME: Admin
      ALLOWED_ORIGINS: http://localhost:3000
      # AI Features (optional — enables skill evolution, benefit headlines)
      # BUILT_IN_FORGE_API_URL: https://...
      # BUILT_IN_FORGE_API_KEY: ...
      # Manus OAuth (optional — omit to use local login)
      # OAUTH_SERVER_URL: https://...
      # VITE_APP_ID: ...
      # VITE_OAUTH_PORTAL_URL: https://...
      # X (Twitter) API (optional — enables X mention scoring)
      # TWITTER_BEARER_TOKEN: AAAA...
      # Stripe (optional — enables billing)
      # STRIPE_SECRET_KEY: sk_live_...
      # STRIPE_WEBHOOK_SECRET: whsec_...
      # Email (optional — enables email notifications)
      # RESEND_API_KEY: re_...
      # FROM_EMAIL: noreply@yourdomain.com
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
